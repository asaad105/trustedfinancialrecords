<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='700' viewBox='0 0 1200 700' role='img' aria-labelledby='title desc'>
  <title id='title'>Our approach process illustration</title>
  <desc id='desc'>A four-step process from analysis to reporting and optimization for financial workflows.</desc>
  <rect width='1200' height='700' fill='#f2f8ff'/>
  <text x='600' y='110' text-anchor='middle' font-size='46' font-family='Arial' fill='#113a6b'>Our Client-First Process</text>
  <line x1='200' y1='350' x2='1000' y2='350' stroke='#a9c4e2' stroke-width='12'/>
  <circle cx='250' cy='350' r='70' fill='#1f6fb2'/><text x='250' y='362' text-anchor='middle' font-size='36' fill='#fff' font-family='Arial'>1</text>
  <circle cx='500' cy='350' r='70' fill='#2f84c8'/><text x='500' y='362' text-anchor='middle' font-size='36' fill='#fff' font-family='Arial'>2</text>
  <circle cx='750' cy='350' r='70' fill='#3f98da'/><text x='750' y='362' text-anchor='middle' font-size='36' fill='#fff' font-family='Arial'>3</text>
  <circle cx='1000' cy='350' r='70' fill='#55a8e6'/><text x='1000' y='362' text-anchor='middle' font-size='36' fill='#fff' font-family='Arial'>4</text>
  <text x='250' y='470' text-anchor='middle' font-size='24' fill='#113a6b' font-family='Arial'>Discovery</text>
  <text x='500' y='470' text-anchor='middle' font-size='24' fill='#113a6b' font-family='Arial'>Setup</text>
  <text x='750' y='470' text-anchor='middle' font-size='24' fill='#113a6b' font-family='Arial'>Reporting</text>
  <text x='1000' y='470' text-anchor='middle' font-size='24' fill='#113a6b' font-family='Arial'>Optimize</text>
</svg>
