<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Trusted Financial Records Company</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="index.html"><img src="assets/logo.svg" alt="Trusted Financial Records Company logo" /><span>Trusted Financial Records Company</span></a>
    <nav><a href="index.html">Home</a><a href="about.html">About Us</a><a href="contact.html" aria-current="page">Contact</a></nav>
  </div>
</header>
<main class="container section">
  <h1>Contact us</h1>
  <p>Reach out to us for personalized financial solutions.</p>
  <form id="contactForm" class="contact-form">
    <label>Name *<input name="name" required /></label>
    <label>Email address *<input name="email" type="email" required /></label>
    <label>Message *<textarea name="message" required></textarea></label>
    <label class="honeypot">Leave this field empty<input name="website" tabindex="-1" autocomplete="off" /></label>
    <button class="btn" type="submit">Submit form</button>
    <p id="formStatus" role="status" aria-live="polite"></p>
  </form>
  <h2>Location</h2>
  <p>Trusted Financial Records Company<br/>Calgary, Alberta, Canada</p>
</main>
<footer class="site-footer"><div class="container"><p>© 2024 - 2026 Trusted Financial Records Company</p></div></footer>
<script src="script.js"></script>
</body>
</html>
